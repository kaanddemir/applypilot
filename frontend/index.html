<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ApplyPilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/app.css" />
<link rel="stylesheet" href="css/profile.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img class="logo" src="assets/logo.png" alt="" aria-hidden="true" />
      <div class="brand-title">ApplyPilot</div>
      <button class="icon-btn collapse-btn" id="collapseBtn" aria-label="Collapse sidebar" title="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    </div>
    <div class="side-main">
      <button class="primary-btn" id="addAppSide" title="Add application">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span class="btn-label">Add application</span>
      </button>
      <div>
        <div class="side-label">Views</div>
        <button class="nav-btn active" id="boardNav" title="Board">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="btn-label">Board</span>
          <span class="count-pill" id="allCount">0</span>
        </button>
        <button class="nav-btn" id="chatNav" title="Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
          <span class="btn-label">Chat</span>
        </button>
      </div>
      <div id="chatHistorySection">
        <div class="side-label">Chat history</div>
        <div class="chat-history" id="chatHistory"></div>
        <button class="ghost-btn sidebar-new-chat" id="newChatBtn">New chat</button>
      </div>
    </div>
    <div class="side-foot">
      <button class="profile-btn" id="profileBtn" title="Profile">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5.5 21a7.5 7.5 0 0 1 13 0"/></svg>
        <span class="btn-label">Profile</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <section class="content" id="content"></section>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
